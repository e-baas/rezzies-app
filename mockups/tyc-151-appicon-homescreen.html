<!doctype html><html><head><meta charset=utf-8><style>
*{box-sizing:border-box;font-family:-apple-system,'Segoe UI',Roboto,sans-serif}
body{margin:0;background:#1c1c1e;padding:40px;display:flex;flex-direction:column;align-items:center}
h1{color:#fff;font-size:24px;font-weight:800;margin:0 0 6px}
.sub{color:#9aa;font-size:14px;margin:0 0 30px}
.phone{width:330px;height:680px;border-radius:46px;padding:54px 26px 26px;

.app{display:flex;flex-direction:column;align-items:center;gap:7px}
.ic{width:60px;height:60px;border-radius:14px}
.real{box-shadow:0 6px 16px rgba(20,184,166,.35)}
.ph{background:#2a2a2e}
.ph.a{background:linear-gradient(135deg,#3b82f6,#1e3a8a)}
.ph.b{background:linear-gradient(135deg,#ef4444,#7f1d1d)}
.ph.c{background:linear-gradient(135deg,#22c55e,#14532d)}
.ph.d{background:linear-gradient(135deg,#a855f7,#581c87)}
.ph.e{background:linear-gradient(135deg,#f59e0b,#92400e)}
.lab{color:#fff;font-size:11px;font-weight:600}
.lab.real{color:#fff;font-weight:800}
.dock{margin-top:18px;background:rgba(255,255,255,.08);border-radius:26px;padding:14px;display:flex;justify-content:space-around}
.dock .ic{width:58px;height:58px}
